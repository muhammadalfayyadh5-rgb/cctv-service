<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Pelanggan CCTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#1e40af,#0ea5e9);
}

.container{
    width:550px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#dbeafe;
    margin-bottom:25px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:14px;
}

input:focus,
textarea:focus,
select:focus{
    box-shadow:0 0 15px rgba(255,255,255,0.4);
}

label{
    color:white;
    font-weight:bold;
}

.preview-img{
    width:100%;
    max-height:250px;
    object-fit:contain;
    border-radius:12px;
    margin-top:10px;
    border:3px solid white;
}

.paket-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
    margin-top:10px;
}

.paket-card{
    border:1px solid rgba(255,255,255,.3);
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    background:rgba(255,255,255,.08);
    color:white;
    transition:.3s;
}

.paket-card input{
    display:none;
}

.paket-card:hover{
    transform:translateY(-3px);
    border-color:#60a5fa;
}

.paket-card:has(input:checked){
    background:#2563eb;
    border-color:#93c5fd;
}

.paket-card h3{
    margin-bottom:5px;
}

.paket-card p{
    font-size:13px;
    opacity:.9;
}

.paket-card b{
    display:block;
    margin-top:8px;
    color:#facc15;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:18px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

@media(max-width:600px){
    .container{
        width:90%;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Edit Pelanggan CCTV</h1>
    <p class="subtitle">
        Perbarui data pelanggan instalasi CCTV
    </p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input
            type="text"
            name="nama"
            value="{{ pelanggan.nama }}"
            placeholder="Nama Lengkap"
            required
        >

        <textarea
            name="alamat"
            placeholder="Alamat Lengkap"
            required
        >{{ pelanggan.alamat }}</textarea>

        <input
            type="text"
            name="no_hp"
            value="{{ pelanggan.no_hp }}"
            placeholder="Nomor HP"
            required
        >

        <h3 style="color:white; margin-top:15px;">
    Pilih Paket CCTV
</h3>

<div class="paket-grid">

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Rumah - 1.500.000"
               {% if pelanggan.paket == "Paket Rumah - 1.500.000" %}checked{% endif %}
               required>
        <h3>Paket Rumah</h3>
        <p>2 - 4 Kamera</p>
        <p>Rumah / Kos</p>
        <b>Rp 1.500.000</b>
    </label>

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Apartemen - 1.200.000"
               {% if pelanggan.paket == "Paket Apartemen - 1.200.000" %}checked{% endif %}>
        <h3>Paket Apartemen</h3>
        <p>1 - 3 Kamera</p>
        <p>Unit / Kamar</p>
        <b>Rp 1.200.000</b>
    </label>

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Toko - 3.000.000"
               {% if pelanggan.paket == "Paket Toko - 3.000.000" %}checked{% endif %}>
        <h3>Paket Toko</h3>
        <p>4 - 6 Kamera</p>
        <p>Warung / UMKM</p>
        <b>Rp 3.000.000</b>
    </label>

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Kantor - 5.500.000"
               {% if pelanggan.paket == "Paket Kantor - 5.500.000" %}checked{% endif %}>
        <h3>Paket Kantor</h3>
        <p>6 - 8 Kamera</p>
        <p>Perkantoran</p>
        <b>Rp 5.500.000</b>
    </label>

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Pabrik - 10.000.000"
               {% if pelanggan.paket == "Paket Pabrik - 10.000.000" %}checked{% endif %}>
        <h3>Paket Pabrik</h3>
        <p>8 - 16 Kamera</p>
        <p>Area Besar</p>
        <b>Rp 10.000.000</b>
    </label>

    <label class="paket-card">
        <input type="radio"
               name="paket"
               value="Paket Premium - 15.000.000"
               {% if pelanggan.paket == "Paket Premium - 15.000.000" %}checked{% endif %}>
        <h3>Paket Premium</h3>
        <p>16+ Kamera</p>
        <p>Gedung Besar</p>
        <b>Rp 15.000.000</b>
    </label>

</div>

        <select name="status" required>
            <option value="{{ pelanggan.status }}">
                {{ pelanggan.status }}
            </option>

            <option value="Menunggu Pembayaran">
                Menunggu Pembayaran
            </option>

            <option value="Menunggu Verifikasi">
                Menunggu Verifikasi
            </option>

            <option value="Diproses">
                Diproses
            </option>

            <option value="Selesai">
                Selesai
            </option>
        </select>

        <button type="submit">
            Update Data
        </button>

    </form>

    <a href="/riwayat/" class="back-btn">
        Kembali ke riwayat
    </a>

</div>

</body>
</html>
