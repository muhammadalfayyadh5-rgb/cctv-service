<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Pelanggan CCTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#1e40af,#0ea5e9);
}

.container{
    width:550px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#dbeafe;
    margin-bottom:25px;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:14px;
}

input:focus,
textarea:focus,
select:focus{
    box-shadow:0 0 15px rgba(255,255,255,0.4);
}

label{
    color:white;
    font-weight:bold;
}

.preview-img{
    width:100%;
    max-height:250px;
    object-fit:contain;
    border-radius:12px;
    margin-top:10px;
    border:3px solid white;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#16a34a;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:18px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

@media(max-width:600px){
    .container{
        width:90%;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Edit Pelanggan CCTV</h1>
    <p class="subtitle">
        Perbarui data pelanggan instalasi CCTV
    </p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input
            type="text"
            name="nama"
            value="{{ pelanggan.nama }}"
            placeholder="Nama Lengkap"
            required
        >

        <textarea
            name="alamat"
            placeholder="Alamat Lengkap"
            required
        >{{ pelanggan.alamat }}</textarea>

        <input
            type="text"
            name="no_hp"
            value="{{ pelanggan.no_hp }}"
            placeholder="Nomor HP"
            required
        >

        <select name="paket" required>
            <option value="{{ pelanggan.paket }}">
                {{ pelanggan.paket }}
            </option>

            <option value="2 Kamera CCTV">
                2 Kamera CCTV - Rp1.500.000
            </option>

            <option value="4 Kamera CCTV">
                4 Kamera CCTV - Rp2.500.000
            </option>

            <option value="8 Kamera CCTV">
                8 Kamera CCTV - Rp4.500.000
            </option>
        </select>

        <select name="status" required>
            <option value="{{ pelanggan.status }}">
                {{ pelanggan.status }}
            </option>

            <option value="Menunggu Pembayaran">
                Menunggu Pembayaran
            </option>

            <option value="Menunggu Verifikasi">
                Menunggu Verifikasi
            </option>

            <option value="Diproses">
                Diproses
            </option>

            <option value="Selesai">
                Selesai
            </option>
        </select>

        <label>
            Bukti Pembayaran
        </label>

        {% if pelanggan.bukti_pembayaran %}
            <img
                src="{{ pelanggan.bukti_pembayaran.url }}"
                class="preview-img"
            >
        {% else %}
            <p style="color:white;margin-top:10px;">
                Belum ada bukti pembayaran
            </p>
        {% endif %}

        <input
            type="file"
            name="bukti_pembayaran"
            accept="image/*"
        >

        <button type="submit">
            Update Data
        </button>

    </form>

    <a href="/riwayat/" class="back-btn">
        Kembali ke riwayat
    </a>

</div>

</body>
</html>
