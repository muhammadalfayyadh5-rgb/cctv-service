<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Planet CCTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* LOGIN BOX */
.login-box{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.login-box p{
    text-align:center;
    margin-bottom:20px;
    font-size:14px;
    color:#cbd5e1;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#38bdf8;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0284c7;
}

/* ERROR */
.error{
    color:#ef4444;
    font-size:13px;
    text-align:center;
    margin-top:10px;
}

/* LINK */
.footer-text{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>LOGIN</h2>
    <p>Masuk ke Dashboard Planet CCTV</p>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    {% if form.errors %}
        <div class="error">Username atau password salah</div>
    {% endif %}

    <div class="footer-text">
        © 2026 Planet CCTV System
    </div>

</div>

</body>
</html>
